{% extends "base.html" %}
{% block title %}New campaign — LoopLink{% endblock %}
{% block content %}
    <h1>New campaign</h1>
    <p class="muted">Offers are added on the next screen, once the campaign exists.</p>

    {% if errors %}
        <div class="errors">{% for e in errors %}<div>{{ e }}</div>{% endfor %}</div>
    {% endif %}

    <form class="card" method="post" action="/campaigns/new">
        <label for="name">Name</label>
        <input type="text" id="name" name="name" value="{{ form.get('name', '') }}" required>

        <label for="description">Description</label>
        <textarea id="description" name="description">{{ form.get('description', '') }}</textarea>

        <div class="row">
            <div style="flex:1">
                <label for="starts_at">Starts at (UTC)</label>
                <input type="datetime-local" id="starts_at" name="starts_at" value="{{ form.get('starts_at', '') }}">
            </div>
            <div style="flex:1">
                <label for="ends_at">Ends at (UTC)</label>
                <input type="datetime-local" id="ends_at" name="ends_at" value="{{ form.get('ends_at', '') }}">
            </div>
        </div>

        <div class="row" style="margin-top:18px">
            <button class="btn primary" type="submit">Create draft</button>
            <a class="btn" href="/campaigns">Cancel</a>
        </div>
    </form>
{% endblock %}
